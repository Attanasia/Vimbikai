<!DOCTYPE html>
<html>
<head>
<style>
body { margin: 0; padding: 2rem; text-align: center; background: #f9f7ff; font-family: sans-serif; }
.container { max-width: 500px; margin: 0 auto; }
.opening { font-size: 20px; font-weight: 600; color: #5a4a9a; margin-bottom: 1.5rem; }
.line { font-size: 16px; color: #333; margin: 1rem 0; line-height: 1.6; }
.yes { font-size: 32px; font-weight: 700; color: #7F77DD; margin: 2rem 0; }
.closing{ font-size: 20px; font-weight: 600; color: #5a4a9a; margin-bottom: 1.5rem; }
button { background: white; border: 2px solid #7F77DD; color: #7F77DD; padding: 14px 40px; font-size: 16px; border-radius: 8px; cursor: pointer; margin-top: 2rem; }
button:hover { background: #EEEDFE; }
.heart { position: fixed; font-size: 28px; pointer-events: none; animation: float 3s ease-out forwards; }
@keyframes float { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-150px); } }
</style>
</head>
<body>
<div class="container">
<div class="opening">Vimbikai,</div>
<div class="line">I literally had to put my phone down for a second.</div>
<div class="line">The way you wrote this had me in tears.</div>
<div class="line">You turned my random Thursday into such a beautiful moment.</div>
<div class="yes">So yes. A thousand times yes.</div>
<div class="line">There is no where else I'd rather be.</div>
<div class="line">I can't wait to celebrate you.</div>
<div class="closing">Love, Atta</div>
<button onclick="hearts()">Click to celebrate</button>
</div>
<script>
function hearts() {
  for(let i = 0; i < 8; i++) {
    setTimeout(() => {
      const h = document.createElement('div');
      h.className = 'heart';
      h.textContent = '💜';
      h.style.left = Math.random() * window.innerWidth + 'px';
      h.style.top = window.innerHeight - 50 + 'px';
      document.body.appendChild(h);
      setTimeout(() => h.remove(), 3000);
    }, i * 120);
  }
}
</script>
</body>
</html>
